<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ALMEER XMD — QR Code</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Segoe UI',sans-serif;background:#0d1117;min-height:100vh;display:flex;align-items:center;justify-content:center;color:#fff;padding:20px}
    .card{background:#161b22;border:1px solid #30363d;border-radius:20px;padding:36px 28px;width:100%;max-width:400px;text-align:center}
    .icon{font-size:48px;margin-bottom:12px}
    h1{font-size:22px;font-weight:800;background:linear-gradient(135deg,#25d366,#128c7e);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
    .sub{color:#8b949e;font-size:13px;margin-bottom:24px}
    .qr-frame{background:#fff;border-radius:14px;padding:14px;display:inline-block;margin-bottom:20px}
    #qr-img{width:220px;height:220px;display:none;border-radius:4px}
    .placeholder{width:220px;height:220px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;color:#999}
    .placeholder .ph-icon{font-size:48px}
    .timer-bar{width:100%;height:5px;background:#30363d;border-radius:3px;overflow:hidden;margin-bottom:6px}
    .timer-fill{height:100%;background:linear-gradient(90deg,#25d366,#128c7e);border-radius:3px;transition:width 1s linear}
    .timer-text{color:#f0883e;font-size:12px;margin-bottom:18px}
    .steps{background:#0d1117;border-radius:12px;padding:16px;margin-bottom:18px;text-align:left}
    .step{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px;font-size:12px;color:#c9d1d9}
    .step:last-child{margin-bottom:0}
    .num{background:#25d366;color:#000;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:10px;flex-shrink:0;margin-top:1px}
    .btn{display:block;background:linear-gradient(135deg,#25d366,#128c7e);color:#fff;border:none;border-radius:10px;padding:12px 28px;font-size:14px;font-weight:700;cursor:pointer;width:100%;margin-bottom:14px}
    .btn:hover{opacity:.85}
    .back{display:block;color:#8b949e;font-size:12px;text-decoration:none}
    .back:hover{color:#25d366}
    .loading{display:flex;align-items:center;justify-content:center;gap:8px;color:#58a6ff;font-size:13px}
    .spinner{width:16px;height:16px;border:2px solid #30363d;border-top-color:#58a6ff;border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📷</div>
    <h1>ALMEER XMD</h1>
    <p class="sub">Click Load QR then scan with WhatsApp</p>
    <div class="qr-frame">
      <div class="placeholder" id="placeholder"><div class="ph-icon">📷</div><p>Click Load QR</p></div>
      <img id="qr-img" src="" alt="QR Code" />
    </div>
    <div class="timer-bar"><div class="timer-fill" id="timerFill" style="width:100%"></div></div>
    <p class="timer-text" id="timerText">Click Load QR to start</p>
    <div class="steps">
      <div class="step"><div class="num">1</div><span>Click <b>Load QR Code</b> below</span></div>
      <div class="step"><div class="num">2</div><span>Open WhatsApp → ⋮ → <b>Linked Devices → Link a Device</b></span></div>
      <div class="step"><div class="num">3</div><span>Point camera at QR code</span></div>
      <div class="step"><div class="num">4</div><span>Session ID sent to your WhatsApp ✅</span></div>
    </div>
    <button class="btn" id="loadBtn" onclick="loadQR()">📷 Load QR Code</button>
    <a href="/" class="back">← Back to Home</a>
  </div>
  <script>
    let timer = null;
    let timeLeft = 30;
    async function loadQR() {
      const img  = document.getElementById('qr-img');
      const ph   = document.getElementById('placeholder');
      const btn  = document.getElementById('loadBtn');
      btn.disabled = true; btn.textContent = '⏳ Loading...';
      ph.style.display = 'flex';
      ph.innerHTML = '<div class="loading"><div class="spinner"></div>Generating QR...</div>';
      img.style.display = 'none';
      try {
        const response = await fetch('/api/qr');
        if (!response.ok) throw new Error('Failed');
        const blob   = await response.blob();
        const imgUrl = URL.createObjectURL(blob);
        img.src = imgUrl; img.style.display = 'block'; ph.style.display = 'none';
        startTimer();
        btn.textContent = '🔄 Reload QR';
      } catch (e) {
        ph.innerHTML = '<div style="color:#f85149;font-size:13px">❌ Failed. Try again.</div>';
      }
      btn.disabled = false;
    }
    function startTimer() {
      clearInterval(timer); timeLeft = 30;
      document.getElementById('timerFill').style.width = '100%';
      document.getElementById('timerFill').style.background = 'linear-gradient(90deg,#25d366,#128c7e)';
      document.getElementById('timerText').innerHTML = '⏳ QR expires in <b id="cd">30</b>s — scan quickly!';
      timer = setInterval(() => {
        timeLeft--;
        document.getElementById('timerFill').style.width = (timeLeft/30*100)+'%';
        const cd = document.getElementById('cd');
        if (cd) cd.textContent = timeLeft;
        if (timeLeft <= 0) {
          clearInterval(timer);
          document.getElementById('timerText').textContent = '❌ QR Expired — click Reload QR';
          document.getElementById('timerFill').style.background = '#f85149';
        }
      }, 1000);
    }
  </script>
</body>
      </html>
