<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ALMEER XMD — Session Generator</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Segoe UI',sans-serif;background:#0d1117;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;padding:20px}
    .bot-icon{font-size:72px;animation:float 3s ease-in-out infinite}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
    h1{font-size:36px;font-weight:900;background:linear-gradient(135deg,#25d366,#128c7e);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:12px 0 4px;letter-spacing:2px}
    .sub{color:#8b949e;font-size:14px;margin-bottom:10px}
    .badge{display:inline-flex;align-items:center;gap:6px;background:#1a4731;border:1px solid #25d366;border-radius:20px;padding:5px 14px;font-size:12px;color:#25d366;margin-bottom:36px}
    .dot{width:8px;height:8px;background:#25d366;border-radius:50%;animation:pulse 1.5s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
    .cards{display:grid;grid-template-columns:1fr 1fr;gap:16px;width:100%;max-width:440px;margin-bottom:30px}
    .card{background:#161b22;border:1px solid #30363d;border-radius:16px;padding:28px 20px;text-align:center;text-decoration:none;color:#fff;transition:all .3s}
    .card:hover{transform:translateY(-6px)}
    .card.green{border-color:#25d366}.card.green:hover{box-shadow:0 16px 40px rgba(37,211,102,0.15)}
    .card.blue{border-color:#58a6ff}.card.blue:hover{box-shadow:0 16px 40px rgba(88,166,255,0.15)}
    .card .icon{font-size:40px;margin-bottom:12px}
    .card h3{font-size:16px;font-weight:700;margin-bottom:6px}
    .card p{font-size:12px;color:#8b949e;line-height:1.6}
    .rec{background:#1a4731;border:1px solid #25d366;border-radius:10px;padding:12px 16px;font-size:12px;color:#25d366;margin-bottom:20px;max-width:440px;width:100%}
    footer{color:#8b949e;font-size:12px}
  </style>
</head>
<body>
  <div class="bot-icon">🤖</div>
  <h1>ALMEER XMD</h1>
  <p class="sub">WhatsApp Bot — Session Generator</p>
  <div class="badge"><div class="dot"></div>Service Online</div>
  <div class="rec">⭐ Recommended: Use Pairing Code — faster and more reliable!</div>
  <div class="cards">
    <a href="/pair" class="card green">
      <div class="icon">🔑</div>
      <h3>Pairing Code</h3>
      <p>Enter your number, get a code, link WhatsApp instantly</p>
    </a>
    <a href="/qr" class="card blue">
      <div class="icon">📷</div>
      <h3>QR Code</h3>
      <p>Scan the QR code with your WhatsApp camera</p>
    </a>
  </div>
  <footer>© ALMEER XMD</footer>
</body>
      </html>
